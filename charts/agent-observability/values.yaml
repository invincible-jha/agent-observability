replicaCount: 1

image:
  repository: ghcr.io/invincible-jha/agent-observability
  pullPolicy: IfNotPresent
  tag: "0.2.0"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: agent-observability.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

serviceAccount:
  create: true
  name: ""

# OpenTelemetry configuration
otel:
  enabled: true
  exporterEndpoint: "http://jaeger-collector:4317"
  serviceName: "agent-observability"
  samplingRatio: "1.0"

# Jaeger integration
jaeger:
  enabled: false
  agentHost: "jaeger-agent"
  agentPort: 6831

env: {}
